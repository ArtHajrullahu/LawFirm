<!DOCTYPE html>
<html>
<head>
  <title>Guess the Number Game</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: darkcyan;
      background-image: url("photo1.png");
      background-repeat: no-repeat;
      background-size: cover;
      width: 100%;
      height: 400px;
    }
    h1 {
      color: #333;
    }
    #inputBox {
      margin-top: 20px;
      width: 700px;
      height: 200px;
      box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.5);
      background-color: #fff;
      margin-left: 500px;
    }
    
    input[type="number"] {
      padding: 10px;
      font-size: 16px;
    }
    
    button {
      padding: 15px 30px;
      font-size: 20px;
      background-color: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
    }
    h1{
      font-style: italic;
    }
  </style>
</head>
<body>
  <h1>Guessing Game?</h1>
  <div id="message"></div>
  <div id="inputBox">
    <h1>Sa here mendoni qe kemi marrur pjese ne gjykate?</h1>
    <input type="number" id="guessInput" min="1" max="100">
    <button onclick="checkGuess()">Guess</button>
  </div>
  
  <script>
    const randomNumber = 71;

    let guessCount = 0;

    function checkGuess() {
      const guessInput = document.getElementById("guessInput");
      const guess = parseInt(guessInput.value);
      
      if (isNaN(guess) || guess < 1 || guess > 100) {
        setMessage("Please enter a valid number between 1 and 100.");
        return;
      }
      
      guessCount++;
      
      if (guess === randomNumber) {
        setMessage(`Congratulations! You guessed the number ${randomNumber} correctly in ${guessCount} attempts.`);
        disableInput();
      } else if (guess < randomNumber) {
        setMessage("Too low! Try a higher number.");
      } else {
        setMessage("Too high! Try a lower number.");
      }
      
      guessInput.value = "";
      guessInput.focus();
    }
    
    function setMessage(message) {
      document.getElementById("message").textContent = message;
    }
    
    function disableInput() {
      document.getElementById("guessInput").disabled = true;
      document.getElementsByTagName("button")[0].disabled = true;
    }
  </script>
</body>
</html>
